<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prospects</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 10px; padding: 28px;
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h3 { margin-bottom: 18px; font-size: 16px; color: #333; }
    .modal .close-btn { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 0; }

    .followup-btn {
      position: fixed; bottom: 28px; right: 28px;
      background: #27ae60; color: white; border: none; border-radius: 50px;
      padding: 12px 22px; font-size: 15px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 50;
      display: flex; align-items: center; gap: 8px;
    }
    .followup-btn:hover { background: #219a52; }
    .followup-badge {
      background: #e74c3c; color: white; border-radius: 50%;
      width: 22px; height: 22px; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .followup-modal { max-width: 680px; }
    .followup-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #f0f0f0; gap: 12px;
    }
    .followup-item:last-child { border-bottom: none; }
    .followup-info { flex: 1; }
    .followup-name { font-size: 14px; font-weight: bold; color: #333; }
    .followup-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .followup-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-email { background: #2980b9; color: white; padding: 5px 12px; font-size: 12px; border-radius: 4px; text-decoration: none; font-weight: bold; }
    .btn-email:hover { background: #2471a3; }

    .log-entry {
      display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-icon {
      width: 32px; height: 32px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .log-body { flex: 1; }
    .log-action { font-size: 13px; font-weight: bold; color: #333; text-transform: capitalize; }
    .log-note   { font-size: 13px; color: #555; margin-top: 2px; }
    .log-time   { font-size: 11px; color: #aaa; margin-top: 3px; }
    .log-delete { background: none; border: none; color: #ddd; cursor: pointer; font-size: 16px; padding: 0; }
    .log-delete:hover { color: #e74c3c; }

    .action-icon-inquiry_received    { background: #eaf4fb; }
    .action-icon-status_changed      { background: #fef9e7; }
    .action-icon-converted_to_student{ background: #eafaf1; }
    .action-icon-called              { background: #f0f0f0; }
    .action-icon-emailed             { background: #eaf4fb; }
    .action-icon-toured              { background: #f5eef8; }
    .action-icon-voicemail           { background: #fdf2e9; }
    .action-icon-note                { background: #f8f9fa; }
  </style>
</head>
<body>

<nav>
  <span class="brand">Daycare</span>
  <a href="centers.html">Centers</a>
  <a href="prospects.html" class="active">Prospects</a>
  <a href="students.html">Students</a>
</nav>

<div class="container">
  <div id="msg" class="msg"></div>

  <!-- Form -->
  <div class="card">
    <h2 id="form-title">Log New Inquiry</h2>
    <div class="form-row">
      <div class="form-group">
        <label>First Name *</label>
        <input id="f-first" type="text" placeholder="First name"/>
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input id="f-last" type="text" placeholder="Last name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="f-email" type="email" placeholder="email@example.com"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input id="f-phone" type="text" placeholder="(555) 000-0000"/>
      </div>
    </div>
    <div class="form-row" style="margin-top:12px">
      <div class="form-group">
        <label>Center</label>
        <select id="f-center"><option value="">— Select Center —</option></select>
      </div>
      <div class="form-group">
        <label>Interested Session</label>
        <select id="f-session">
          <option value="">— Select —</option>
          <option value="spring">Spring</option>
          <option value="summer">Summer</option>
          <option value="fall">Fall</option>
        </select>
      </div>
      <div class="form-group">
        <label>Inquiry Date</label>
        <input id="f-date" type="date"/>
      </div>
      <div class="form-group" id="status-group" style="display:none">
        <label>Status</label>
        <select id="f-status">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="touring">Touring</option>
          <option value="enrolling">Enrolling</option>
          <option value="enrolled">Enrolled</option>
          <option value="lost">Lost</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:12px">
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Any notes about this inquiry..."></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveProspect()">Save</button>
      <button class="btn-cancel" id="btn-cancel" onclick="resetForm()" style="display:none">Cancel</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBy('all', this)">All</button>
    <button class="filter-btn" onclick="filterBy('new', this)">New</button>
    <button class="filter-btn" onclick="filterBy('contacted', this)">Contacted</button>
    <button class="filter-btn" onclick="filterBy('touring', this)">Touring</button>
    <button class="filter-btn" onclick="filterBy('enrolling', this)">Enrolling</button>
    <button class="filter-btn" onclick="filterBy('enrolled', this)">Enrolled</button>
    <button class="filter-btn" onclick="filterBy('lost', this)">Lost</button>
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Prospect Log</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Center</th>
          <th>Session</th>
          <th>Date</th>
          <th>Status</th>
          <th>Student</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="prospects-body">
        <tr><td colspan="9" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Follow-up Floating Button -->
<button class="followup-btn" onclick="openFollowupModal()">
  Follow-up <span class="followup-badge" id="followup-count">0</span>
</button>

<!-- Follow-up Modal -->
<div class="modal-overlay" id="followup-modal">
  <div class="modal followup-modal">
    <button class="close-btn" onclick="closeFollowupModal()">&#x2715;</button>
    <h3>Prospects to Follow Up</h3>
    <p style="font-size:13px;color:#888;margin-bottom:16px">Prospects with status: New, Contacted, or Touring.</p>
    <div id="followup-list"></div>
  </div>
</div>

<!-- Email Compose Modal -->
<div class="modal-overlay" id="email-modal">
  <div class="modal" style="max-width:620px">
    <button class="close-btn" onclick="closeEmailModal()">&#x2715;</button>
    <h3 id="email-modal-title">✉️ Compose Email</h3>

    <!-- Template switcher -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button class="filter-btn" id="tpl-btn-followup1" onclick="switchTemplate('followup1')">1st Follow-up</button>
      <button class="filter-btn" id="tpl-btn-followup2" onclick="switchTemplate('followup2')">2nd Follow-up</button>
      <button class="filter-btn" id="tpl-btn-called"    onclick="switchTemplate('called')">After Call</button>
      <button class="filter-btn" id="tpl-btn-toured"    onclick="switchTemplate('toured')">After Tour</button>
    </div>

    <div class="form-group" style="margin-bottom:12px">
      <label>To</label>
      <input id="email-to" type="email" placeholder="recipient@email.com"/>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Subject</label>
      <input id="email-subject" type="text"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Message</label>
      <textarea id="email-body" style="min-height:240px"></textarea>
    </div>
    <div id="email-msg" class="msg"></div>
    <div class="btn-row">
      <button class="btn-success" onclick="sendEmail()">Send Email</button>
      <button class="btn-cancel"  onclick="closeEmailModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div class="modal-overlay" id="log-modal">
  <div class="modal">
    <button class="close-btn" onclick="closeLogModal()">&#x2715;</button>
    <h3 id="log-modal-title">Activity Log</h3>

    <!-- Add log entry -->
    <div class="form-row">
      <div class="form-group" style="max-width:180px">
        <label>Action</label>
        <select id="log-action">
          <option value="called">Called</option>
          <option value="emailed">Emailed</option>
          <option value="toured">Toured</option>
          <option value="voicemail">Left Voicemail</option>
          <option value="note">Note</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:10px">
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="log-note" placeholder="Enter details, observations, or follow-up notes..." style="min-height:90px"></textarea>
      </div>
    </div>
    <div class="btn-row" style="margin-bottom:20px">
      <button class="btn-primary" onclick="addLogEntry()">Add Entry</button>
    </div>

    <!-- Log timeline -->
    <div class="section-title">History</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button class="filter-btn active" onclick="filterLog('all', this)">All</button>
      <button class="filter-btn" onclick="filterLog('called', this)">📞 Called</button>
      <button class="filter-btn" onclick="filterLog('emailed', this)">✉️ Emailed</button>
      <button class="filter-btn" onclick="filterLog('toured', this)">🏫 Toured</button>
      <button class="filter-btn" onclick="filterLog('voicemail', this)">📱 Voicemail</button>
      <button class="filter-btn" onclick="filterLog('note', this)">📝 Note</button>
      <button class="filter-btn" onclick="filterLog('status_changed', this)">🔄 Status</button>
    </div>
    <div id="log-timeline"></div>
  </div>
</div>

<script>
  let allProspects = [];
  let editingId     = null;
  let logProspectId = null;
  let allLogs       = [];
  let activeLogFilter = 'all';

  const ACTION_ICONS = {
    inquiry_received:     '📋',
    status_changed:       '🔄',
    converted_to_student: '🎓',
    called:               '📞',
    emailed:              '✉️',
    toured:               '🏫',
    voicemail:            '📱',
    note:                 '📝',
  };

  async function loadCenters() {
    const res = await fetch('/api/centers');
    const centers = await res.json();
    const sel = document.getElementById('f-center');
    centers.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    });
  }

  async function loadProspects() {
    const res = await fetch('/api/prospects');
    allProspects = await res.json();
    renderTable(allProspects);
    updateFollowupCount();
  }

  function renderTable(data) {
    const tbody = document.getElementById('prospects-body');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">No prospects yet.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(p => `
      <tr>
        <td>${p.first_name} ${p.last_name}</td>
        <td>${p.email || '—'}</td>
        <td>${p.phone || '—'}</td>
        <td>${p.centers?.name || '—'}</td>
        <td>${p.interested_session ? cap(p.interested_session) : '—'}</td>
        <td>${p.inquiry_date ? p.inquiry_date.split('T')[0] : '—'}</td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        <td>${p.student_id ? '<a href="students.html">View</a>' : '—'}</td>
        <td>
          <button class="action-btn btn-edit" onclick="editProspect(${p.id})">Edit</button>
          <button class="action-btn" style="background:#8e44ad;color:white" onclick="openLogModal(${p.id}, '${esc(p.first_name)} ${esc(p.last_name)}')">Log</button>
          <button class="action-btn btn-delete" onclick="deleteProspect(${p.id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function filterBy(status, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allProspects : allProspects.filter(p => p.status === status);
    renderTable(filtered);
  }

  async function saveProspect() {
    const first_name = document.getElementById('f-first').value.trim();
    const last_name  = document.getElementById('f-last').value.trim();
    if (!first_name || !last_name) return showMsg('First and last name are required.', 'error');

    const body = {
      first_name, last_name,
      email:              document.getElementById('f-email').value.trim(),
      phone:              document.getElementById('f-phone').value.trim(),
      center_id:          document.getElementById('f-center').value || null,
      interested_session: document.getElementById('f-session').value || null,
      inquiry_date:       document.getElementById('f-date').value || null,
      notes:              document.getElementById('f-notes').value.trim(),
      status:             document.getElementById('f-status').value || 'new',
    };

    if (editingId && body.status === 'enrolling') {
      const current = allProspects.find(p => p.id === editingId);
      if (current && !current.student_id) {
        if (!confirm('Changing status to "Enrolling" will automatically create a student record. Continue?')) return;
      }
    }

    const method = editingId ? 'PUT' : 'POST';
    const url    = editingId ? `/api/prospects/${editingId}` : '/api/prospects';
    const res = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });

    if (!res.ok) { const e = await res.json(); return showMsg(e.error, 'error'); }

    const result = await res.json();
    if (result.converted) {
      showMsg(`Prospect updated and student record created (ID #${result.student_id}).`, 'success');
    } else {
      showMsg(editingId ? 'Prospect updated.' : 'Prospect logged.', 'success');
    }

    resetForm(); loadProspects();
  }

  async function editProspect(id) {
    const res = await fetch(`/api/prospects/${id}`);
    const p = await res.json();
    editingId = id;
    document.getElementById('f-first').value   = p.first_name || '';
    document.getElementById('f-last').value    = p.last_name  || '';
    document.getElementById('f-email').value   = p.email      || '';
    document.getElementById('f-phone').value   = p.phone      || '';
    document.getElementById('f-center').value  = p.center_id  || '';
    document.getElementById('f-session').value = p.interested_session || '';
    document.getElementById('f-date').value    = p.inquiry_date ? p.inquiry_date.split('T')[0] : '';
    document.getElementById('f-notes').value   = p.notes      || '';
    document.getElementById('f-status').value  = p.status     || 'new';
    document.getElementById('form-title').textContent = 'Edit Prospect';
    document.getElementById('status-group').style.display = 'flex';
    document.getElementById('btn-cancel').style.display   = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function deleteProspect(id) {
    if (!confirm('Delete this prospect?')) return;
    const res = await fetch(`/api/prospects/${id}`, { method: 'DELETE' });
    if (!res.ok) return showMsg('Could not delete.', 'error');
    showMsg('Prospect deleted.', 'success'); loadProspects();
  }

  function resetForm() {
    editingId = null;
    ['f-first','f-last','f-email','f-phone','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-center').value  = '';
    document.getElementById('f-session').value = '';
    document.getElementById('f-date').value    = new Date().toISOString().split('T')[0];
    document.getElementById('f-status').value  = 'new';
    document.getElementById('form-title').textContent = 'Log New Inquiry';
    document.getElementById('status-group').style.display = 'none';
    document.getElementById('btn-cancel').style.display   = 'none';
  }

  // ---- LOG MODAL ----
  async function openLogModal(prospectId, name) {
    logProspectId = prospectId;
    document.getElementById('log-modal-title').textContent = `Activity Log — ${name}`;
    document.getElementById('log-modal').classList.add('open');
    await refreshLogTimeline();
  }

  function closeLogModal() {
    document.getElementById('log-modal').classList.remove('open');
    document.getElementById('log-note').value = '';
    logProspectId = null;
    activeLogFilter = 'all';
    document.querySelectorAll('#log-modal .filter-btn').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
  }

  function filterLog(type, btn) {
    activeLogFilter = type;
    document.querySelectorAll('#log-modal .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = type === 'all' ? allLogs : allLogs.filter(l => l.action === type);
    renderLogTimeline(filtered);
  }

  async function refreshLogTimeline() {
    const res = await fetch(`/api/prospects/${logProspectId}/logs`);
    allLogs = await res.json();
    const filtered = activeLogFilter === 'all' ? allLogs : allLogs.filter(l => l.action === activeLogFilter);
    renderLogTimeline(filtered);
  }

  function renderLogTimeline(logs) {
    const el = document.getElementById('log-timeline');

    if (!logs.length) {
      el.innerHTML = '<p style="color:#aaa;font-size:14px;padding:8px 0">No entries for this filter.</p>';
      return;
    }

    el.innerHTML = logs.map(l => {
      const icon  = ACTION_ICONS[l.action] || '•';
      const label = l.action.replace(/_/g, ' ');
      const statusChange = l.status_from && l.status_to
        ? `<span style="color:#888;font-size:12px"> &nbsp;${cap(l.status_from)} → ${cap(l.status_to)}</span>`
        : '';
      return `
        <div class="log-entry">
          <div class="log-icon action-icon-${l.action}">${icon}</div>
          <div class="log-body">
            <div class="log-action">${label}${statusChange}</div>
            ${l.note ? `<div class="log-note">${l.note}</div>` : ''}
            <div class="log-time">${formatDate(l.created_at)}</div>
          </div>
          <button class="log-delete" title="Delete" onclick="deleteLogEntry(${l.id})">×</button>
        </div>
      `;
    }).join('');
  }

  async function addLogEntry() {
    const action = document.getElementById('log-action').value;
    const note   = document.getElementById('log-note').value.trim();
    const res = await fetch(`/api/prospects/${logProspectId}/logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, note: note || null })
    });
    if (!res.ok) { const e = await res.json(); return showMsg(e.error, 'error'); }
    document.getElementById('log-note').value = '';
    await refreshLogTimeline();
  }

  async function deleteLogEntry(logId) {
    if (!confirm('Remove this log entry?')) return;
    await fetch(`/api/prospects/${logProspectId}/logs/${logId}`, { method: 'DELETE' });
    await refreshLogTimeline();
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text; el.className = 'msg ' + type;
    setTimeout(() => el.className = 'msg', 4000);
  }

  // ---- FOLLOW-UP MODAL ----
  function updateFollowupCount() {
    const followups = allProspects.filter(p => ['new','contacted','touring'].includes(p.status));
    document.getElementById('followup-count').textContent = followups.length;
  }

  function openFollowupModal() {
    const followups = allProspects
      .filter(p => ['new','contacted','touring'].includes(p.status))
      .sort((a, b) => new Date(a.inquiry_date) - new Date(b.inquiry_date));

    const list = document.getElementById('followup-list');
    if (!followups.length) {
      list.innerHTML = '<p style="color:#aaa;text-align:center;padding:24px">No prospects need follow-up right now.</p>';
    } else {
      list.innerHTML = followups.map(p => {
        const daysSince = p.inquiry_date
          ? Math.floor((new Date() - new Date(p.inquiry_date)) / 86400000)
          : '—';
        return `
          <div class="followup-item">
            <div class="followup-info">
              <div class="followup-name">${p.first_name} ${p.last_name}</div>
              <div class="followup-meta">
                <span class="badge badge-${p.status}">${p.status}</span>
                &nbsp;·&nbsp; ${p.email || 'No email'} &nbsp;·&nbsp; ${p.phone || 'No phone'}
                &nbsp;·&nbsp; Inquired ${daysSince} day${daysSince !== 1 ? 's' : ''} ago
                ${p.interested_session ? `&nbsp;·&nbsp; ${cap(p.interested_session)}` : ''}
              </div>
            </div>
            <div class="followup-actions">
              ${p.email
                ? `<button class="btn-email" onclick="openEmailModal('${esc(p.email)}', '${esc(p.first_name)}', '${esc(p.last_name)}', '${p.interested_session || ''}', ${p.id})">✉️ Email</button>`
                : `<span style="font-size:12px;color:#ccc">No email</span>`
              }
              <button class="action-btn btn-edit" onclick="closeFollowupModal(); editProspect(${p.id})">Edit</button>
              <button class="action-btn" style="background:#8e44ad;color:white" onclick="closeFollowupModal(); openLogModal(${p.id}, '${esc(p.first_name)} ${esc(p.last_name)}')">Log</button>
            </div>
          </div>
        `;
      }).join('');
    }
    document.getElementById('followup-modal').classList.add('open');
  }

  function closeFollowupModal() {
    document.getElementById('followup-modal').classList.remove('open');
  }

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
  function esc(v) { return (v || '').replace(/'/g, "\\'"); }

  // ---- EMAIL MODAL ----
  let emailProspectId   = null;
  let emailFirstName    = '';
  let emailLastName     = '';
  let emailSession      = '';
  let currentFollowUpNum  = 1;
  let currentTemplateKey  = 'followup1';

  const TEMPLATES = {
    followup1: (firstName, session) => ({
      label: '1st Follow-up',

  async function openEmailModal(email, firstName, lastName, session, prospectId) {
    emailProspectId = prospectId || null;
    emailFirstName  = firstName;
    emailLastName   = lastName;
    emailSession    = session;

    // Auto-detect best template from log history
    let defaultTpl = 'followup1';
    if (prospectId) {
      const res  = await fetch(`/api/prospects/${prospectId}/logs`);
      const logs = await res.json();
      const lastAction = logs.find(l => ['called','toured','emailed'].includes(l.action));
      if (lastAction?.action === 'toured') defaultTpl = 'toured';
      else if (lastAction?.action === 'called') defaultTpl = 'called';
      else {
        const emailsSent = logs.filter(l => l.action === 'emailed').length;
        defaultTpl = emailsSent >= 1 ? 'followup2' : 'followup1';
      }
    }

    document.getElementById('email-to').value      = email;
    document.getElementById('email-msg').className = 'msg';
    document.getElementById('email-modal-title').textContent = `✉️ Email — ${firstName} ${lastName}`;
    document.getElementById('email-modal').classList.add('open');
    switchTemplate(defaultTpl);
  }

  function switchTemplate(key) {
    currentTemplateKey = key;
    currentFollowUpNum = key.startsWith('followup') ? parseInt(key.slice(-1)) : 1;
    const tpl = TEMPLATES[key](emailFirstName, emailSession);
    document.getElementById('email-subject').value = tpl.subject;
    document.getElementById('email-body').value    = tpl.body;
    Object.keys(TEMPLATES).forEach(k => {
      document.getElementById(`tpl-btn-${k}`).classList.toggle('active', k === key);
    });
  }

  function closeEmailModal() {
    document.getElementById('email-modal').classList.remove('open');
    emailProspectId = null;
  }

  async function sendEmail() {
    const to      = document.getElementById('email-to').value.trim();
    const subject = document.getElementById('email-subject').value.trim();
    const body    = document.getElementById('email-body').value.trim();
    if (!to || !subject || !body) return showEmailMsg('All fields are required.', 'error');

    const btn = event.target;
    btn.textContent = 'Sending...';
    btn.disabled = true;

    const res = await fetch('/api/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, subject, body, prospect_id: emailProspectId, follow_up_number: currentTemplateKey })
    });

    btn.textContent = 'Send Email';
    btn.disabled = false;

    if (!res.ok) {
      const err = await res.json();
      return showEmailMsg(err.error, 'error');
    }

    showEmailMsg('Email sent and logged successfully!', 'success');
    setTimeout(() => { closeEmailModal(); loadProspects(); }, 2000);
  }

  function showEmailMsg(text, type) {
    const el = document.getElementById('email-msg');
    el.textContent = text; el.className = 'msg ' + type;
  }

  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  loadCenters();
  loadProspects();
</script>
</body>
</html>
