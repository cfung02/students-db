<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .dashboard-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .dashboard-header h1 {
      font-size: 20px; color: #7d3c0f; flex: 1;
    }
    .stat-bar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .stat-card {
      background: #fffaf5; border: 1px solid #f5dfc0; border-radius: 8px;
      padding: 14px 20px; min-width: 140px; text-align: center;
    }
    .stat-card .stat-value { font-size: 28px; font-weight: bold; color: #c0552a; }
    .stat-card .stat-label { font-size: 12px; color: #a0673a; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

    /* Date filter */
    .date-filter {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: #fffaf5; border: 1px solid #f5dfc0; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 20px;
    }
    .date-filter label {
      font-size: 13px; color: #7d3c0f; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .date-filter input[type="date"] {
      border: 1px solid #e8c9a8; border-radius: 6px; padding: 6px 10px;
      font-size: 13px; color: #333; background: white; cursor: pointer;
      outline: none;
    }
    .date-filter input[type="date"]:focus { border-color: #c0552a; }
    .date-filter .btn-apply {
      background: #7d3c0f; color: white; border: none; border-radius: 6px;
      padding: 7px 18px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    .date-filter .btn-apply:hover { background: #c0552a; }
    .date-filter .btn-reset {
      background: none; color: #a0673a; border: 1px solid #e8c9a8;
      border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    .date-filter .btn-reset:hover { background: #fdebd0; }
    .filter-range-label { font-size: 12px; color: #aaa; margin-left: 4px; }

    /* Daily counts table */
    .table-wrapper { overflow-x: auto; }
    #counts-table {
      border-collapse: collapse; font-size: 12px; width: 100%;
      min-width: 900px;
    }
    #counts-table th, #counts-table td {
      padding: 7px 10px; text-align: center; border-bottom: 1px solid #f5dfc0; white-space: nowrap;
    }
    #counts-table thead tr:first-child th { background: #7d3c0f; color: white; font-size: 11px; }
    #counts-table thead tr:nth-child(2) th { background: #fdebd0; color: #7d3c0f; font-size: 11px; }
    #counts-table tbody tr:hover td { background: #fef0e0; }
    #counts-table .group-name { text-align: left; font-weight: bold; color: #7d3c0f; min-width: 80px; }
    #counts-table .unique-col { background: #fef5ec; color: #a0673a; font-weight: bold; }
    #counts-table .total-row td { background: #fdebd0; font-weight: bold; color: #7d3c0f; border-top: 2px solid #c0552a; }
    #counts-table .zero { color: #ddd; }
    #counts-table .week-sep { border-left: 2px solid #e8c9a8; }
    #counts-table .day-sub { display: block; font-weight: normal; font-size: 10px; color: #bbb; margin-top: 1px; }

    /* Day-of-week color coding */
    .day-M  { background: #f9f9f9; }
    .day-Tu { background: #fffdf9; }
    .day-W  { background: #f9f9f9; }
    .day-Th { background: #fffdf9; }
    .day-F  { background: #fff8f0; }

    .loading-msg { text-align: center; padding: 40px; color: #aaa; }
    .no-data-msg { text-align: center; padding: 40px; color: #c0552a; font-size: 13px; }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 20px;
      border-bottom: 2px solid #f5dfc0;
    }
    .tab-btn {
      padding: 9px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: #a0673a;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .tab-btn:hover { color: #7d3c0f; }
    .tab-btn.active { color: #7d3c0f; border-bottom-color: #c0552a; }

    /* Group count table */
    #group-count-view { display: none; }
    #group-count-table {
      border-collapse: collapse; font-size: 13px; width: 100%; max-width: 400px;
    }
    #group-count-table th, #group-count-table td {
      padding: 10px 16px; text-align: left; border-bottom: 1px solid #f5dfc0;
    }
    #group-count-table thead th { background: #7d3c0f; color: white; font-size: 12px; }
    #group-count-table tbody tr:hover td { background: #fef0e0; }
    #group-count-table .count-col { text-align: center; font-weight: bold; color: #c0552a; }
    #group-count-table .total-row td { background: #fdebd0; font-weight: bold; color: #7d3c0f; border-top: 2px solid #c0552a; }
  </style>
</head>
<body>

<nav>
  <span class="brand">Daycare</span>
  <a href="centers.html">Centers</a>
  <a href="prospects.html">Prospects</a>
  <a href="students.html">Students</a>
</nav>

<div class="container" style="max-width:1400px">
  <div id="msg" class="msg"></div>

  <div class="dashboard-header">
    <h1 id="page-title">School Dashboard</h1>
    <a href="centers.html" class="btn-cancel" style="padding:8px 16px;border-radius:6px;text-decoration:none;font-size:13px;">&#8592; Back to Centers</a>
  </div>

  <!-- Summary stats -->
  <div class="stat-bar">
    <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total Unique</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-groups">—</div><div class="stat-label">Groups</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-weeks">—</div><div class="stat-label">Weeks Shown</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-peak">—</div><div class="stat-label">Peak Daily Count</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('daily')">Daily Count</button>
    <button class="tab-btn" onclick="switchTab('groups')">Group Count</button>
  </div>

  <!-- Date filter -->
  <div class="date-filter">
    <label>Start Date <input type="date" id="start-date"/></label>
    <label>End Date &nbsp; <input type="date" id="end-date"/></label>
    <button class="btn-apply" onclick="applyFilter()">Apply</button>
    <button class="btn-reset" onclick="resetFilter()">Reset</button>
    <span class="filter-range-label" id="filter-range-label"></span>
  </div>

  <!-- Daily counts grid -->
  <div id="daily-count-view">
    <div class="card">
      <h2>Daily Attendance by Group</h2>
      <div class="table-wrapper">
        <table id="counts-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"><tr><td class="loading-msg" colspan="100">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Group counts -->
  <div id="group-count-view">
    <div class="card">
      <h2>Students per Group</h2>
      <table id="group-count-table">
        <thead><tr><th>Group</th><th class="count-col"># Students</th></tr></thead>
        <tbody id="group-count-body"><tr><td class="loading-msg" colspan="2">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const params     = new URLSearchParams(location.search);
  const centerId   = params.get('center_id') || 1;
  const centerName = params.get('name') || 'Dashboard';

  document.getElementById('page-title').textContent = centerName + ' — Dashboard';

  const DAY_NAMES     = ['Su','M','Tu','W','Th','F','Sa'];
  const DAY_FULL      = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  let allDates  = [];
  let allGroups = [];
  let grandTotal = 0;

  function dayOfWeek(dateStr) {
    return DAY_NAMES[new Date(dateStr + 'T00:00:00Z').getUTCDay()];
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00Z');
    return (d.getUTCMonth()+1) + '/' + d.getUTCDate();
  }

  function toInputDate(dateStr) { return dateStr; } // already YYYY-MM-DD

  async function load() {
    try {
      const res  = await fetch(`/api/centers/${centerId}/dashboard`);
      const data = await res.json();
      if (!res.ok) return showMsg(data.error, 'error');

      if (data.type === 'weekly') {
        // School year: Mon–Fri aggregate, no date filter
        document.querySelector('.date-filter').style.display = 'none';
        renderWeeklyTable(data);
      } else {
        // Summer camp: dated columns with date range filter
        allDates   = data.dates;
        allGroups  = data.groups;
        grandTotal = data.grandTotal;
        if (allDates.length) {
          document.getElementById('start-date').value = allDates[0].date;
          document.getElementById('end-date').value   = allDates[allDates.length - 1].date;
        }
        renderTable(allDates, allGroups, grandTotal);
      }

      if (data.groupCounts) renderGroupCounts(data.groupCounts);
    } catch(err) {
      showMsg('Failed to load dashboard: ' + err.message, 'error');
    }
  }

  function renderWeeklyTable(data) {
    const { days, dayTotals, groups, grandTotal } = data;
    const peak = Math.max(...dayTotals);

    document.getElementById('stat-total').textContent  = grandTotal || '—';
    document.getElementById('stat-groups').textContent = groups.length;
    document.getElementById('stat-weeks').textContent  = '—';
    document.getElementById('stat-peak').textContent   = peak;

    const DAY_CLASSES = { Mon: 'day-M', Tue: 'day-Tu', Weds: 'day-W', Thur: 'day-Th', Fri: 'day-F' };

    document.getElementById('table-head').innerHTML = `
      <tr>
        <th style="text-align:left">Group</th>
        ${days.map(d => `<th class="${DAY_CLASSES[d] || ''}">${d}</th>`).join('')}
      </tr>
    `;

    const groupRows = groups.map(g => `
      <tr>
        <td class="group-name">${g.name}</td>
        ${g.daily.map((v, i) => `
          <td class="${DAY_CLASSES[days[i]] || ''} ${v === 0 ? 'zero' : ''}">${v === 0 ? '·' : v}</td>
        `).join('')}
      </tr>
    `).join('');

    const totalRow = `
      <tr class="total-row">
        <td class="group-name">DAILY TOTAL</td>
        ${dayTotals.map((v, i) => `<td class="${DAY_CLASSES[days[i]] || ''}">${v}</td>`).join('')}
      </tr>
    `;

    document.getElementById('table-body').innerHTML = groupRows + totalRow;
  }

  function applyFilter() {
    const start = document.getElementById('start-date').value;
    const end   = document.getElementById('end-date').value;
    if (!start || !end) return showMsg('Please select both start and end dates.', 'error');
    if (start > end)    return showMsg('Start date must be before end date.', 'error');

    const filtered = allDates.filter(d => d.date >= start && d.date <= end);
    if (!filtered.length) {
      document.getElementById('table-head').innerHTML = '';
      document.getElementById('table-body').innerHTML = '<tr><td class="no-data-msg" colspan="100">No data for the selected date range.</td></tr>';
      updateStats([], allGroups, grandTotal);
      return;
    }

    const filteredGroups = allGroups.map(g => {
      const indexMap = filtered.map(fd => allDates.findIndex(d => d.date === fd.date));
      return { name: g.name, unique: g.unique, daily: indexMap.map(i => g.daily[i] || 0) };
    });

    renderTable(filtered, filteredGroups, grandTotal);
    updateFilterLabel(start, end, filtered.length);
  }

  function resetFilter() {
    if (!allDates.length) return;
    document.getElementById('start-date').value = allDates[0].date;
    document.getElementById('end-date').value   = allDates[allDates.length - 1].date;
    document.getElementById('filter-range-label').textContent = '';
    renderTable(allDates, allGroups, grandTotal);
  }

  function updateFilterLabel(start, end, count) {
    document.getElementById('filter-range-label').textContent =
      `Showing ${count} day${count !== 1 ? 's' : ''} (${formatDate(start)} – ${formatDate(end)})`;
  }

  function renderTable(dates, groups, total) {
    updateStats(dates, groups, total);

    const weekBreaks = new Set();
    let lastWeek = null;
    dates.forEach((d, i) => {
      if (d.week !== lastWeek) { weekBreaks.add(i); lastWeek = d.week; }
    });

    const weekCols = {};
    dates.forEach(d => { weekCols[d.week] = (weekCols[d.week] || 0) + 1; });
    const weekEntries = [...new Set(dates.map(d => d.week))].map(w => ({ week: w, span: weekCols[w] }));

    document.getElementById('table-head').innerHTML = `
      <tr>
        <th rowspan="2" style="text-align:left">Group</th>
        <th rowspan="2" class="unique-col">Unique</th>
        ${weekEntries.map(w => `<th colspan="${w.span}">Week ${w.week}</th>`).join('')}
      </tr>
      <tr>
        ${dates.map((d,i) => `
          <th class="day-${dayOfWeek(d.date)} ${weekBreaks.has(i) ? 'week-sep' : ''}">
            ${dayOfWeek(d.date)}
            <span class="day-sub">${formatDate(d.date)}</span>
          </th>
        `).join('')}
      </tr>
    `;

    const groupRows = groups.map(g => `
      <tr>
        <td class="group-name">${g.name}</td>
        <td class="unique-col">${g.unique}</td>
        ${g.daily.map((v, i) => `
          <td class="${v === 0 ? 'zero' : ''} day-${dayOfWeek(dates[i].date)} ${weekBreaks.has(i) ? 'week-sep' : ''}">
            ${v === 0 ? '·' : v}
          </td>
        `).join('')}
      </tr>
    `).join('');

    const totalRow = `
      <tr class="total-row">
        <td class="group-name">DAILY TOTAL</td>
        <td class="unique-col">${total}</td>
        ${dates.map((d, i) => `<td class="${weekBreaks.has(i) ? 'week-sep' : ''}">${d.total}</td>`).join('')}
      </tr>
    `;

    document.getElementById('table-body').innerHTML = groupRows + totalRow;
  }

  function updateStats(dates, groups, total) {
    const weeks = [...new Set(dates.map(d => d.week))].length;
    const peak  = dates.length ? Math.max(...dates.map(d => d.total)) : 0;
    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-groups').textContent = groups.length;
    document.getElementById('stat-weeks').textContent  = weeks;
    document.getElementById('stat-peak').textContent   = peak;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('daily-count-view').style.display = tab === 'daily' ? '' : 'none';
    document.getElementById('group-count-view').style.display = tab === 'groups' ? '' : 'none';
    const filter = document.querySelector('.date-filter');
    if (filter) filter.style.display = tab === 'daily' && filter.dataset.hasFilter === 'true' ? '' : (tab === 'daily' ? filter.style.display : 'none');
  }

  function renderGroupCounts(groupCounts) {
    const total = groupCounts.reduce((s, g) => s + g.count, 0);
    const rows  = groupCounts.map(g => `
      <tr>
        <td>${g.name}</td>
        <td class="count-col">${g.count}</td>
      </tr>
    `).join('');
    document.getElementById('group-count-body').innerHTML = rows + `
      <tr class="total-row">
        <td>TOTAL</td>
        <td class="count-col">${total}</td>
      </tr>
    `;
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text; el.className = 'msg ' + type;
    setTimeout(() => el.className = 'msg', 4000);
  }

  load();
</script>
</body>
</html>
